<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DH Exchange - Mid-market exchange rate</title>
    <!-- TailwindCSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        surface: '#ffffff',
                        background: '#f3f4f6',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        /* Hide number input arrows */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
    </style>
</head>
<body>
    <div class="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full border border-gray-100">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">DH Exchange</h1>
        <p class="text-sm text-gray-500 mb-6 text-center">Mid-market exchange rate</p>
        
        <div class="space-y-4 relative">
            
            <!-- Amount Input -->
            <div class="p-4 border border-gray-200 rounded-xl focus-within:ring-2 focus-within:ring-primary focus-within:border-primary transition-all group">
                <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase">Amount</label>
                <div class="flex items-center">
                    <input type="number" id="input-amount" value="1000" min="0" step="0.01" class="w-full text-2xl font-semibold outline-none bg-transparent" placeholder="0.00">
                    <select id="base-currency" class="ml-4 font-bold text-gray-700 bg-gray-100 border-none rounded-lg p-2 outline-none cursor-pointer hover:bg-gray-200 transition-colors">
                        <option value="VND">VND</option>
                        <option value="USD" selected>USD</option>
                        <option value="CNY">CNY</option>
                        <option value="JPY">JPY</option>
                        <option value="KRW">KRW</option>
                        <option value="EUR">EUR</option>
                    </select>
                </div>
            </div>

            <!-- Swap Button -->
            <div class="absolute left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-10" style="top: 50%;">
                <button id="swap-btn" class="bg-white border border-gray-200 shadow-sm p-2 rounded-full hover:bg-gray-50 hover:shadow transition-all text-primary focus:outline-none focus:ring-2 focus:ring-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M3 7.5L7.5 3m0 0L12 7.5M7.5 3v13.5m13.5 0L16.5 21m0 0L12 16.5m4.5 4.5V7.5" />
                    </svg>
                </button>
            </div>

            <!-- Result Output -->
            <div class="p-4 bg-gray-50 border border-gray-200 rounded-xl">
                <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase">Converted</label>
                <div class="flex items-center">
                    <input type="text" id="output-amount" class="w-full text-2xl font-semibold outline-none bg-transparent text-gray-800" readonly placeholder="0.00">
                    <select id="target-currency" class="ml-4 font-bold text-gray-700 bg-gray-200 border-none rounded-lg p-2 outline-none cursor-pointer hover:bg-gray-300 transition-colors">
                        <option value="VND" selected>VND</option>
                        <option value="USD">USD</option>
                        <option value="CNY">CNY</option>
                        <option value="JPY">JPY</option>
                        <option value="KRW">KRW</option>
                        <option value="EUR">EUR</option>
                    </select>
                </div>
            </div>
            
        </div>
        
        <div class="mt-6 text-center min-h-[20px]">
            <span id="rate-display" class="text-sm font-medium text-gray-600"></span>
        </div>
        <div id="error-message" class="mt-2 text-center text-sm font-medium text-red-500 hidden"></div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
